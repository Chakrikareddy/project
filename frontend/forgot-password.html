<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - AI ATS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .auth-title {
            text-align: center;
            font-size: 1.8rem;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .auth-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .auth-btn {
            background: var(--primary-gradient);
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(123, 97, 255, 0.3);
        }

        .auth-links {
            margin-top: 20px;
            text-align: center;
            font-size: 0.9rem;
        }

        .auth-links a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="logo">AI ATS System</div>
        <div class="nav-links">
            <a href="signin.html">Back to Sign In</a>
        </div>
    </nav>
    <div class="container auth-container">
        <div class="auth-card">
            <h2 class="auth-title">Reset Password</h2>
            <p class="auth-subtitle" id="form-subtitle">Enter your email to reset your password</p>
            <form id="check-email-form">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" id="reset-email" placeholder="you@example.com" required>
                </div>
                <button type="submit" class="auth-btn">Send Reset Link</button>
            </form>
            <div id="mail-sent-msg" class="hidden" style="text-align: center;">
                <div style="font-size: 3.5rem; color: var(--primary-color); margin-bottom: 15px;">
                    <i class="fa-solid fa-envelope-circle-check"></i>
                </div>
                <p style="font-size: 1.1rem; color: var(--text-primary); font-weight: 500;">
                    We've sent a password reset link to:
                </p>
                <p>
                    <strong id="sent-email-display" style="color: var(--primary-color); font-size: 1.1rem;"></strong>
                </p>
                <p style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 15px; margin-bottom: 25px;">
                    Please check your Gmail inbox (and spam folder) for the link to reset your password.
                </p>
                <hr style="border: 0; border-top: 1px solid var(--border-color); margin-bottom: 20px;">
                <p style="font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 10px;">For Testing Purposes:
                </p>
                <button type="button" class="btn-outline-primary"
                    style="width: 100%; border: 1px solid var(--primary-color); padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; color: var(--primary-color); background: transparent;"
                    onclick="simulateEmailClick()">
                    Click Here to Simulate Opening the Email Link
                </button>
            </div>
            <form id="reset-password-form" class="hidden">
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" class="form-input" id="new-pass" placeholder="Enter new password" required>
                </div>
                <button type="submit" class="auth-btn">Update Password</button>
            </form>
            <div class="auth-links">
                <p>Remember your password? <a href="signin.html">Sign In</a></p>
            </div>
        </div>
    </div>
    <script>
        let currentResetEmail = '';
        document.getElementById('check-email-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = document.getElementById('reset-email').value;
            let users = JSON.parse(localStorage.getItem('users')) || [];
            const userExists = users.find(u => u.email === email);
            if (!userExists) {
                alert('No account found with this email.');
                return;
            }
            currentResetEmail = email;
            document.getElementById('check-email-form').classList.add('hidden');
            document.getElementById('mail-sent-msg').classList.remove('hidden');
            document.getElementById('sent-email-display').textContent = email;
            document.getElementById('form-subtitle').textContent = "Check your email!";
        });
        function simulateEmailClick() {
            document.getElementById('mail-sent-msg').classList.add('hidden');
            document.getElementById('reset-password-form').classList.remove('hidden');
            document.getElementById('form-subtitle').textContent = "Create a new strong password.";
        }
        document.getElementById('reset-password-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const newPassword = document.getElementById('new-pass').value;
            let users = JSON.parse(localStorage.getItem('users')) || [];
            const userIndex = users.findIndex(u => u.email === currentResetEmail);
            if (userIndex > -1) {
                users[userIndex].password = newPassword;
                localStorage.setItem('users', JSON.stringify(users));
                alert('Password updated successfully! Please sign in with your new password.');
                window.location.href = 'signin.html';
            }
        });
    </script>
</body>

</html>
